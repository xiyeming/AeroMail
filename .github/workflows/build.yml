name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend dependencies
        run: pnpm install

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'v__VERSION__'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Upload deb artifact
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: src-tauri/target/release/bundle/deb/*.deb

      - name: Upload AppImage artifact
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: appimage-package
          path: src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz

  update-latest-json:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Get Linux signatures
        id: linux_sig
        run: |
          if [ -f "artifacts/appimage-package/*.sig" ]; then
            echo "signature=$(cat artifacts/appimage-package/*.sig)" >> $GITHUB_OUTPUT
          else
            echo "signature=" >> $GITHUB_OUTPUT
          fi

      - name: Get Windows signatures
        id: win_sig
        run: |
          if [ -f "artifacts/windows-setup/*.sig" ]; then
            echo "signature=$(cat artifacts/windows-setup/*.sig)" >> $GITHUB_OUTPUT
          else
            echo "signature=" >> $GITHUB_OUTPUT
          fi

      - name: Get macOS signatures
        id: mac_sig
        run: |
          if [ -f "artifacts/macos-universal/*.sig" ]; then
            echo "signature=$(cat artifacts/macos-universal/*.sig)" >> $GITHUB_OUTPUT
          else
            echo "signature=" >> $GITHUB_OUTPUT
          fi

      - name: Generate latest.json
        run: |
          VERSION=${{ steps.version.outputs.version }}
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          cat > latest.json << EOF
          {
            "version": "$VERSION",
            "notes": "Release v$VERSION",
            "pub_date": "$PUB_DATE",
            "platforms": {
              "linux-x86_64": {
                "signature": "${{ steps.linux_sig.outputs.signature }}",
                "url": "https://github.com/${{ github.repository }}/releases/download/v$VERSION/aeromail_${VERSION}_amd64.AppImage.tar.gz"
              },
              "windows-x86_64": {
                "signature": "${{ steps.win_sig.outputs.signature }}",
                "url": "https://github.com/${{ github.repository }}/releases/download/v$VERSION/aeromail_${VERSION}_x64-setup.nsis.zip"
              },
              "darwin-x86_64": {
                "signature": "${{ steps.mac_sig.outputs.signature }}",
                "url": "https://github.com/${{ github.repository }}/releases/download/v$VERSION/AeroMail_${VERSION}_x64.dmg"
              },
              "darwin-aarch64": {
                "signature": "${{ steps.mac_sig.outputs.signature }}",
                "url": "https://github.com/${{ github.repository }}/releases/download/v$VERSION/AeroMail_${VERSION}_aarch64.dmg"
              }
            }
          }
          EOF

      - name: Upload latest.json to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: latest.json
          overwrite: true
