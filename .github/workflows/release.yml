name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      include-armv7:
        description: 'Build optional Linux armv7 .deb via emulation (slow, ~1 hour)'
        required: false
        default: 'false'
      include-arch:
        description: 'Build Arch Linux pkg.tar.zst'
        required: false
        default: 'true'

# Allow creating releases and uploading assets.
permissions:
  contents: write

jobs:
  build:
    # Only run on real release tags to prevent workflow_dispatch from arbitrary
    # branches gaining write access to releases.
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            rust-targets: x86_64-unknown-linux-gnu
            args: '--target x86_64-unknown-linux-gnu'
          - platform: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            rust-targets: aarch64-unknown-linux-gnu
            args: '--target aarch64-unknown-linux-gnu'
          - platform: macos-latest
            target: universal-apple-darwin
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
            args: '--target universal-apple-darwin'
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            rust-targets: x86_64-pc-windows-msvc
            args: '--target x86_64-pc-windows-msvc'
          - platform: windows-latest
            target: i686-pc-windows-msvc
            rust-targets: i686-pc-windows-msvc
            args: '--target i686-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev libayatana-appindicator3-dev

      - name: Build and upload Tauri bundles
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPIMAGE_EXTRACT_AND_RUN: ${{ runner.os == 'Linux' && '1' || '' }}
          NO_STRIP: ${{ runner.os == 'Linux' && 'true' || '' }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'AeroMail ${{ github.ref_name }}'
          releaseBody: |
            🎉 AeroMail ${{ github.ref_name }} is available!

            | Platform | Architecture | Bundles |
            |----------|--------------|---------|
            | Linux | x86_64 | `.deb`, `.AppImage`, `.tar.gz` |
            | Linux | aarch64 | `.deb`, `.AppImage`, `.tar.gz` |
            | Linux | armv7 (optional) | `.deb` |
            | macOS | universal | `.dmg` |
            | Windows | x86_64 | `.msi`, `.exe` (NSIS) |
            | Windows | i686 | `.msi`, `.exe` (NSIS) |
            | Arch Linux | x86_64 | `.pkg.tar.zst` |

            Download the asset for your platform below.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Create Linux .tar.gz archive from AppImage
        if: runner.os == 'Linux'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          set -e
          VERSION="${TAG_NAME#v}"

          if [ "$TARGET" = "x86_64-unknown-linux-gnu" ]; then
            APPIMAGE_ARCH="amd64"
            ARCHIVE_ARCH="x86_64"
          elif [ "$TARGET" = "aarch64-unknown-linux-gnu" ]; then
            APPIMAGE_ARCH="aarch64"
            ARCHIVE_ARCH="aarch64"
          else
            echo "No AppImage tar.gz wrapper defined for target $TARGET"
            exit 0
          fi

          APPIMAGE_DIR="src-tauri/target/${TARGET}/release/bundle/appimage"
          APPIMAGE_NAME="aeromail_${VERSION}_${APPIMAGE_ARCH}.AppImage"
          ARCHIVE_NAME="aeromail-${TAG_NAME}-linux-${ARCHIVE_ARCH}.tar.gz"

          if [ -f "${APPIMAGE_DIR}/${APPIMAGE_NAME}" ]; then
            tar czf "${ARCHIVE_NAME}" -C "${APPIMAGE_DIR}" "${APPIMAGE_NAME}"
            gh release upload "${TAG_NAME}" "${ARCHIVE_NAME}" --clobber
          else
            echo "AppImage not found at ${APPIMAGE_DIR}/${APPIMAGE_NAME}; skipping tar.gz"
          fi

  build-linux-armv7:
    if: startsWith(github.ref, 'refs/tags/v') && (github.event_name == 'push' || inputs.include-armv7 == 'true')
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download and verify ARMv7 base image
        run: |
          set -e
          IMAGE_URL="https://dietpi.com/downloads/images/DietPi_RPi2-ARMv7-Bookworm.img.xz"
          IMAGE_SHA256="51bed57eb2f8bc9269f66549b608095070e006c9d93c770e256da1517ddd837c"
          IMAGE_PATH="/tmp/DietPi_RPi2-ARMv7-Bookworm.img.xz"

          curl -L -o "$IMAGE_PATH" "$IMAGE_URL"
          echo "$IMAGE_SHA256  $IMAGE_PATH" | sha256sum -c -

      - name: Build armv7 .deb in emulated ARM environment
        uses: pguyot/arm-runner-action@e1773de1ed6eb61848f5693de824d836f0b0ea25 # v2.6.5
        with:
          base_image: file:///tmp/DietPi_RPi2-ARMv7-Bookworm.img.xz
          cpu: cortex-a53
          bind_mount_repository: true
          image_additional_mb: 10240
          optimize_image: no
          commands: |
            export HOME=/root
            export CARGO_REGISTRIES_CRATES_IO_PROTOCOL=sparse

            apt-get update -y --allow-releaseinfo-change
            apt-get autoremove -y
            apt-get install -y --no-install-recommends --no-install-suggests curl libwebkit2gtk-4.1-dev build-essential libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf libfuse2 file nodejs npm

            npm install -g pnpm

            curl https://sh.rustup.rs -sSf | sh -s -- -y --default-toolchain stable
            . "$HOME/.cargo/env"

            pnpm install
            pnpm tauri build -- --bundles deb

      - name: Upload armv7 .deb to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -e
          VERSION="$(jq -r .version src-tauri/tauri.conf.json)"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: $VERSION"
            exit 1
          fi
          DEB="src-tauri/target/release/bundle/deb/aeromail_${VERSION}_armhf.deb"
          if [ -f "$DEB" ]; then
            gh release upload "${TAG_NAME}" "$DEB" --clobber
          else
            echo "armv7 .deb not found at $DEB; skipping upload"
          fi

  build-arch-pkg:
    if: startsWith(github.ref, 'refs/tags/v') && (github.event_name == 'push' || inputs.include-arch == 'true')
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Arch build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed base-devel webkit2gtk-4.1 libayatana-appindicator librsvg nodejs npm rustup jq
          npm install -g pnpm
          rustup default stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Build frontend and Rust binary
        run: |
          pnpm install
          pnpm build
          pnpm tauri build --no-bundle

      - name: Build pacman package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -e
          VERSION="$(jq -r .version src-tauri/tauri.conf.json)"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: $VERSION"
            exit 1
          fi
          PKGDIR="packaging/arch"
          install -Dm755 "src-tauri/target/release/aeromail" "$PKGDIR/aeromail"
          install -Dm644 "src-tauri/icons/icon.png" "$PKGDIR/icon.png"
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" "$PKGDIR/PKGBUILD"
          cd "$PKGDIR"
          makepkg -s --noconfirm
          PKG="aeromail-${VERSION}-1-x86_64.pkg.tar.zst"
          if [ -f "$PKG" ]; then
            gh release upload "${TAG_NAME}" "$PKG" --clobber
          else
            echo "Package not found: $PKG"
            exit 1
          fi
