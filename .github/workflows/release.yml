name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      include-arch:
        description: 'Build Arch Linux pkg.tar.zst'
        required: false
        default: 'true'

# Allow creating releases and uploading assets.
permissions:
  contents: write

jobs:
  build:
    # Only run on real release tags to prevent workflow_dispatch from arbitrary
    # branches gaining write access to releases.
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            rust-targets: x86_64-unknown-linux-gnu
            args: '--target x86_64-unknown-linux-gnu'
          - platform: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            rust-targets: aarch64-unknown-linux-gnu
            args: '--target aarch64-unknown-linux-gnu'
          - platform: macos-latest
            target: universal-apple-darwin
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
            args: '--target universal-apple-darwin'
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            rust-targets: x86_64-pc-windows-msvc
            args: '--target x86_64-pc-windows-msvc'
          - platform: windows-latest
            target: i686-pc-windows-msvc
            rust-targets: i686-pc-windows-msvc
            args: '--target i686-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev libayatana-appindicator3-dev

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          set -e
          CURRENT_TAG="${{ github.ref_name }}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')

          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi

          # Collect conventional-commit messages, grouped by category.
          {
            echo "## What's Changed"
            echo ""

            # ── New Features ──
            FEATS=$(git log "$RANGE" --pretty=format:'- %s (%h)' --grep='^feat' --extended-regexp 2>/dev/null || true)
            if [ -n "$FEATS" ]; then
              echo "### 🚀 New Features"
              echo "$FEATS"
              echo ""
            fi

            # ── Bug Fixes ──
            FIXES=$(git log "$RANGE" --pretty=format:'- %s (%h)' --grep='^fix' --extended-regexp 2>/dev/null || true)
            if [ -n "$FIXES" ]; then
              echo "### 🐛 Bug Fixes"
              echo "$FIXES"
              echo ""
            fi

            # ── Performance ──
            PERFS=$(git log "$RANGE" --pretty=format:'- %s (%h)' --grep='^perf' --extended-regexp 2>/dev/null || true)
            if [ -n "$PERFS" ]; then
              echo "### ⚡ Performance"
              echo "$PERFS"
              echo ""
            fi

            # ── CI / Build ──
            CIS=$(git log "$RANGE" --pretty=format:'- %s (%h)' --grep='^ci' --extended-regexp 2>/dev/null || true)
            if [ -n "$CIS" ]; then
              echo "### 🔧 CI / Build"
              echo "$CIS"
              echo ""
            fi

            # ── Refactor ──
            REFACTORS=$(git log "$RANGE" --pretty=format:'- %s (%h)' --grep='^refactor' --extended-regexp 2>/dev/null || true)
            if [ -n "$REFACTORS" ]; then
              echo "### ♻️ Refactor"
              echo "$REFACTORS"
              echo ""
            fi

            # ── Documentation ──
            DOCS=$(git log "$RANGE" --pretty=format:'- %s (%h)' --grep='^docs' --extended-regexp 2>/dev/null || true)
            if [ -n "$DOCS" ]; then
              echo "### 📝 Documentation"
              echo "$DOCS"
              echo ""
            fi

            # ── Other (uncategorized) ──
            CATEGORIZED="^feat|^fix|^perf|^ci|^refactor|^docs|^chore"
            OTHERS=$(git log "$RANGE" --pretty=format:'- %s (%h)' --invert-grep --grep="$CATEGORIZED" --extended-regexp 2>/dev/null | grep -v "^- Merge " || true)
            if [ -n "$OTHERS" ]; then
              echo "### 📦 Other Changes"
              echo "$OTHERS"
              echo ""
            fi

            if [ -n "$PREV_TAG" ]; then
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${CURRENT_TAG}"
            fi
          } > /tmp/changelog.md

          # Expose as output for later steps (multiline-safe delimiter).
          {
            echo "body<<CHANGELOG_EOF"
            cat /tmp/changelog.md
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

          cat /tmp/changelog.md

      - name: Build and upload Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPIMAGE_EXTRACT_AND_RUN: ${{ runner.os == 'Linux' && '1' || '' }}
          NO_STRIP: ${{ runner.os == 'Linux' && 'true' || '' }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'AeroMail ${{ github.ref_name }}'
          releaseBody: |
            🎉 AeroMail ${{ github.ref_name }} is available!

            | Platform | Architecture | Bundles |
            |----------|--------------|---------|
            | Linux | x86_64 | `.deb`, `.AppImage`, `.tar.gz` |
            | Linux | aarch64 | `.deb`, `.AppImage`, `.tar.gz` |
            | macOS | universal | `.dmg` |
            | Windows | x86_64 | `.msi`, `.exe` (NSIS) |
            | Windows | i686 | `.msi`, `.exe` (NSIS) |
            | Arch Linux | x86_64 | `.pkg.tar.zst` |

            Download the asset for your platform below.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Append changelog to release body
        if: runner.os == 'Linux' && matrix.target == 'x86_64-unknown-linux-gnu'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          CHANGELOG: ${{ steps.changelog.outputs.body }}
        run: |
          set -e
          RELEASE_ID=$(gh api "repos/${{ github.repository }}/releases/tags/${TAG_NAME}" --jq '.id')

          cat > /tmp/release_body.md <<'BODY_EOF'
          🎉 AeroMail ${{ github.ref_name }} is available!

          BODY_EOF

          echo "$CHANGELOG" >> /tmp/release_body.md

          cat >> /tmp/release_body.md <<'BODY_EOF'

          ---

          | Platform | Architecture | Bundles |
          |----------|--------------|---------|
          | Linux | x86_64 | `.deb`, `.AppImage`, `.tar.gz` |
          | Linux | aarch64 | `.deb`, `.AppImage`, `.tar.gz` |
          | macOS | universal | `.dmg` |
          | Windows | x86_64 | `.msi`, `.exe` (NSIS) |
          | Windows | i686 | `.msi`, `.exe` (NSIS) |
          | Arch Linux | x86_64 | `.pkg.tar.zst` |

          Download the asset for your platform below.
          BODY_EOF

          gh api -X PATCH "repos/${{ github.repository }}/releases/${RELEASE_ID}" \
            -f body="$(cat /tmp/release_body.md)"

      - name: Create Linux .tar.gz archive from AppImage
        if: runner.os == 'Linux'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          set -e
          VERSION="${TAG_NAME#v}"

          if [ "$TARGET" = "x86_64-unknown-linux-gnu" ]; then
            APPIMAGE_ARCH="amd64"
            ARCHIVE_ARCH="x86_64"
          elif [ "$TARGET" = "aarch64-unknown-linux-gnu" ]; then
            APPIMAGE_ARCH="aarch64"
            ARCHIVE_ARCH="aarch64"
          else
            echo "No AppImage tar.gz wrapper defined for target $TARGET"
            exit 0
          fi

          APPIMAGE_DIR="src-tauri/target/${TARGET}/release/bundle/appimage"
          APPIMAGE_NAME="aeromail_${VERSION}_${APPIMAGE_ARCH}.AppImage"
          ARCHIVE_NAME="aeromail-${TAG_NAME}-linux-${ARCHIVE_ARCH}.tar.gz"

          if [ -f "${APPIMAGE_DIR}/${APPIMAGE_NAME}" ]; then
            tar czf "${ARCHIVE_NAME}" -C "${APPIMAGE_DIR}" "${APPIMAGE_NAME}"
            gh release upload "${TAG_NAME}" "${ARCHIVE_NAME}" --clobber
          else
            echo "AppImage not found at ${APPIMAGE_DIR}/${APPIMAGE_NAME}; skipping tar.gz"
          fi

  build-arch-pkg:
    if: startsWith(github.ref, 'refs/tags/v') && (github.event_name == 'push' || inputs.include-arch == 'true')
    needs: build
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Arch build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed base-devel webkit2gtk-4.1 libayatana-appindicator librsvg nodejs pnpm rustup jq github-cli git
          rustup default stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Build frontend and Rust binary
        run: |
          pnpm install
          pnpm build
          pnpm tauri build --no-bundle

      - name: Build pacman package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -e
          VERSION="$(jq -r .version src-tauri/tauri.conf.json)"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: $VERSION"
            exit 1
          fi
          PKGDIR="packaging/arch"

          # makepkg refuses to run as root; create a dedicated builder user.
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

          install -Dm755 "src-tauri/target/release/aeromail" "$PKGDIR/aeromail"
          install -Dm644 "src-tauri/icons/icon.png" "$PKGDIR/icon.png"
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" "$PKGDIR/PKGBUILD"

          # Grant the builder user ownership of the packaging directory.
          chown -R builder:builder "$PKGDIR"

          # Build the package as the non-root user.
          su builder -c "cd '$PKGDIR' && makepkg -s --noconfirm"

          PKG="aeromail-${VERSION}-1-x86_64.pkg.tar.zst"
          if [ -f "$PKGDIR/$PKG" ]; then
            gh release upload "${TAG_NAME}" "$PKGDIR/$PKG" --clobber
          else
            echo "Package not found: $PKG"
            exit 1
          fi

  generate-update-json:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version and generate latest.json
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -e
          VERSION="${TAG_NAME#v}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          REPO="${{ github.repository }}"

          # 获取各平台的签名文件
          get_asset_signature() {
            local pattern="$1"
            local assets=$(gh release view "$TAG_NAME" --json assets --jq '.assets[].name')
            for asset in $assets; do
              if [[ "$asset" == $pattern ]]; then
                local sig_file="${asset}.sig"
                # 尝试从 release assets 获取签名
                gh release download "$TAG_NAME" -p "$sig_file" -D /tmp/sigs 2>/dev/null || true
                if [ -f "/tmp/sigs/$sig_file" ]; then
                  cat "/tmp/sigs/$sig_file"
                  return 0
                fi
              fi
            done
            echo ""
          }

          mkdir -p /tmp/sigs

          # Linux x86_64
          LINUX_X64_SIG=$(get_asset_signature "aeromail-${VERSION}_amd64.AppImage")
          # Linux aarch64
          LINUX_ARM_SIG=$(get_asset_signature "aeromail-${VERSION}_aarch64.AppImage")
          # macOS
          MACOS_SIG=$(get_asset_signature "AeroMail_${VERSION}_*.dmg")
          # Windows
          WIN_SIG=$(get_asset_signature "AeroMail_${VERSION}_x64-setup.nsis.exe")

          cat > latest.json << EOF
          {
            "version": "$VERSION",
            "notes": "Release v$VERSION",
            "pub_date": "$PUB_DATE",
            "platforms": {
              "linux-x86_64": {
                "signature": "$LINUX_X64_SIG",
                "url": "https://github.com/$REPO/releases/download/v$VERSION/aeromail-${VERSION}_amd64.AppImage.tar.gz"
              },
              "linux-aarch64": {
                "signature": "$LINUX_ARM_SIG",
                "url": "https://github.com/$REPO/releases/download/v$VERSION/aeromail-${VERSION}_aarch64.AppImage.tar.gz"
              },
              "darwin-x86_64": {
                "signature": "$MACOS_SIG",
                "url": "https://github.com/$REPO/releases/download/v$VERSION/AeroMail_${VERSION}_x64.dmg"
              },
              "darwin-aarch64": {
                "signature": "$MACOS_SIG",
                "url": "https://github.com/$REPO/releases/download/v$VERSION/AeroMail_${VERSION}_aarch64.dmg"
              },
              "windows-x86_64": {
                "signature": "$WIN_SIG",
                "url": "https://github.com/$REPO/releases/download/v$VERSION/AeroMail_${VERSION}_x64-setup.nsis.exe"
              }
            }
          }
          EOF

          cat latest.json

      - name: Upload latest.json to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: latest.json
          overwrite: true
