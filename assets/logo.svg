<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1220" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#818CF8" />
    </linearGradient>
    <linearGradient id="paperGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F2FE" />
      <stop offset="100%" stop-color="#C7D2FE" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0EA5E9" flood-opacity="0.25" />
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bgGradient)" />

  <g transform="translate(256 256)" filter="url(#shadow)">
    <!-- Envelope base -->
    <path d="M-120 20 L-120 80 Q-120 100 -100 100 L100 100 Q120 100 120 80 L120 20 L0 90 Z"
          fill="none" stroke="url(#accentGradient)" stroke-width="14" stroke-linejoin="round" />

    <!-- Paper airplane / letter A -->
    <path d="M-130 -100 L0 -20 L130 -100 L0 60 Z" fill="url(#paperGradient)" />
    <path d="M-130 -100 L0 60 L130 -100" fill="none" stroke="url(#accentGradient)" stroke-width="16" stroke-linejoin="round" stroke-linecap="round" />
    <path d="M-55 -55 L0 -20 L55 -55" fill="none" stroke="#0F172A" stroke-width="10" stroke-linejoin="round" stroke-linecap="round" opacity="0.18" />

    <!-- Speed trail -->
    <path d="M-145 35 L-95 70" stroke="#38BDF8" stroke-width="10" stroke-linecap="round" opacity="0.6" />
    <path d="M-150 65 L-115 90" stroke="#818CF8" stroke-width="8" stroke-linecap="round" opacity="0.45" />
  </g>
</svg>
